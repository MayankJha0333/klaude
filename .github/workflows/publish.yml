name: Publish

# Publishes all platform-specific VSIXs to the VS Code Marketplace (vsce) and
# the Open VSX Registry (ovsx) — the latter is what Cursor / VSCodium / Gitpod
# use. Each registry gets one package per target (darwin/linux/alpine/win32,
# x64 + arm64), each carrying exactly one native `claude` binary.
#
# Trigger by pushing a version tag (e.g. `git tag v0.1.1 && git push --tags`)
# or via the "Run workflow" button (workflow_dispatch).
#
# Required repo secrets:
#   AZURE_TOKEN — Azure DevOps PAT, scope "Marketplace > Manage" (for vsce)
#   VSX_TOKEN   — Open VSX access token from open-vsx.org (for ovsx)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      registries:
        description: "Which registries to publish to"
        type: choice
        default: both
        options: [both, vsce, ovsx]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix webview ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(node -e "console.log(require('./package.json').version)")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Lint and test
        run: |
          npm run lint
          npm test

      - name: Build extension + webview
        run: npm run build

      - name: Cache native CLI binaries
        uses: actions/cache@v4
        with:
          path: .cache/claude-bins
          key: claude-bins-${{ hashFiles('package-lock.json') }}

      - name: Package all platform VSIXs
        env:
          CLAUDE_BIN_CACHE: ${{ github.workspace }}/.cache/claude-bins
        run: npm run package:targets

      - name: Publish to VS Code Marketplace
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.registries != 'ovsx' }}
        env:
          VSCE_PAT: ${{ secrets.AZURE_TOKEN }}
        run: npm run publish:vsce

      - name: Publish to Open VSX
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.registries != 'vsce' }}
        env:
          OVSX_PAT: ${{ secrets.VSX_TOKEN }}
        run: npm run publish:ovsx

      - name: Upload VSIX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: klaude-vsix
          path: dist-vsix/*.vsix
          if-no-files-found: ignore
